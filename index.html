<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Amazonas App</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <div class="container">

    <h1>🌿 Amazonas Restaurante</h1>

    <div id="login-section">
      <h2>Iniciar sesión</h2>
      <input id="loginUser" placeholder="Usuario">
      <input id="loginPass" type="password" placeholder="Contraseña">
      <button type="button" onclick="login()">Entrar</button>
      <p>¿No tienes cuenta?</p>
      <button type="button" onclick="showRegister()">Registrarse</button>
      <hr style="margin: 20px 0; border: 0; border-top: 1px solid rgba(255,255,255,0.2);">
      <button type="button" onclick="loginWithGoogle()" style="background: #fff; color: #444; font-weight: bold; display: flex; align-items: center; justify-content: center; margin: 0 auto; width: 100%;">
        <img src="https://cdn1.iconfinder.com/data/icons/google-s-logo/150/Google_Icons-09-512.png" alt="Google" style="width:20px; margin-right:8px;">
        Entrar con Google
      </button>
    </div>

    <div id="register-section" style="display: none;">
      <h2>Crear Cuenta</h2>
      <input id="regUser" placeholder="Correo electrónico">
      <input id="regPass" type="password" placeholder="Contraseña segura">
      <button type="button" onclick="register()">Registrarme ahora 🎉</button>
      <p>¿Ya tienes cuenta?</p>
      <button type="button" onclick="showLogin()">Volver al Login</button>
    </div>

    <div id="app-section" style="display: none;">
      <div id="userDisplay" style="font-weight: bold; margin-bottom: 15px; background: rgba(255,255,255,0.15); padding: 8px 12px; border-radius: 8px; display: inline-block;">👤 Sesión: cargando...</div>
      
      <h2>Tus Cupones Disponibles</h2>
      <div id="couponList">
        <p style="opacity: 0.7;">Buscando cupones activos... ⏳</p>
      </div>

      <button type="button" onclick="logout()" class="delete-btn" style="margin-top: 25px; width: 100%;">Cerrar Sesión</button>
    </div>

    <div id="admin-section" style="display: none;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin: 0;">🛠️ Panel de Control (Admin)</h2>
        <button type="button" onclick="logout()" class="delete-btn" style="margin: 0; padding: 6px 12px; font-size: 14px;">Salir</button>
      </div>

      <div class="admin-box">
        <h3>✨ Crear Nuevo Cupón</h3>
        <input id="newCouponCode" placeholder="CÓDIGO DEL CUPÓN (Ej: BIENVENIDA)" style="text-transform: uppercase;">
        <input id="newCouponDiscount" type="number" placeholder="Porcentaje Descuento (Opcional, Ej: 15)">
        <input id="newCouponDescription" placeholder="Descripción corta del beneficio (Ej: 15% desc. en cenas)">
        
        <div style="text-align: left; margin: 10px 0;">
          <label style="font-size: 14px; opacity: 0.9;">Fecha de Inicio (Activación):</label>
          <input id="newCouponStart" type="datetime-local">
        </div>

        <div style="text-align: left; margin: 10px 0;">
          <label style="font-size: 14px; opacity: 0.9;">Fecha de Fin (Vencimiento):</label>
          <input id="newCouponEnd" type="datetime-local">
        </div>

        <div style="text-align: left; margin: 15px 0;">
          <label style="font-size: 14px; opacity: 0.9; display: block; margin-bottom: 8px;">Días Permitidos (Si no marcas ninguno, será válido siempre):</label>
          <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
            <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; background: rgba(255,255,255,0.15); padding: 8px; border-radius: 6px; cursor: pointer;">
              <input type="checkbox" name="couponDays" value="Lunes"> Lunes
            </label>
            <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; background: rgba(255,255,255,0.15); padding: 8px; border-radius: 6px; cursor: pointer;">
              <input type="checkbox" name="couponDays" value="Martes"> Martes
            </label>
            <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; background: rgba(255,255,255,0.15); padding: 8px; border-radius: 6px; cursor: pointer;">
              <input type="checkbox" name="couponDays" value="Miércoles"> Miércoles
            </label>
            <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; background: rgba(255,255,255,0.15); padding: 8px; border-radius: 6px; cursor: pointer;">
              <input type="checkbox" name="couponDays" value="Jueves"> Jueves
            </label>
            <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; background: rgba(255,255,255,0.15); padding: 8px; border-radius: 6px; cursor: pointer;">
              <input type="checkbox" name="couponDays" value="Viernes"> Viernes
            </label>
            <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; background: rgba(255,255,255,0.15); padding: 8px; border-radius: 6px; cursor: pointer;">
              <input type="checkbox" name="couponDays" value="Sábado"> Sábado
            </label>
            <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; background: rgba(255,255,255,0.15); padding: 8px; border-radius: 6px; cursor: pointer;">
              <input type="checkbox" name="couponDays" value="Domingo"> Domingo
            </label>
          </div>
        </div>

        <button type="button" onclick="crearCuponAdminSupabase()" style="width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;">
          💾 Guardar Cupón en Supabase
        </button>
      </div>

      <div class="admin-box scanner-section">
        <h3>📷 Escáner de Cupones QR</h3>
        <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 15px;">
          <button type="button" onclick="iniciarEscaneoCamara()" style="background-color: #2ecc71; margin: 0;">Activar Cámara</button>
          <button type="button" onclick="detenerEscaneoCamara()" class="delete-btn" style="margin: 0;">Apagar</button>
  </div>
  <div id="camera-wrapper" style="width: 100%; min-height: 300px; display: none; background: #111; border-radius: 10px; overflow: hidden;">
    <div id="reader" style="width: 100% !important;"></div>
  </div>
</div>

      <div class="admin-box">
        <h3>👥 Usuarios Registrados (Local)</h3>
        <input id="searchUser" oninput="renderUsers()" placeholder="Buscar usuario...">
        <ul id="usersList"></ul>
      </div>
    </div>

  </div>
</body>
</html>
